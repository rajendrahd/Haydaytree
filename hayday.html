<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The King's Farm | Global Harvest Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --hd-gold: #ffcc00;
            --hd-brown: #5d4037;
            --hd-border: #3e2723;
            --wa-green: #2ecc71;
            --wa-ch-deep: #075e54;
            --fb-blue: #1877f2;
            --ig-gradient: linear-gradient(45deg, #f09433, #e1306c, #bc1888);
            --sky-blue: #4fc3f7;
        }

        /* --- BACKGROUND ANIMASI --- */
        body {
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            overflow-x: hidden; font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to bottom, #4fc3f7 0%, #81d4fa 40%, #76b041 100%);
        }

        .cloud {
            position: fixed; background: white; border-radius: 50px;
            opacity: 0.8; z-index: -1; animation: moveClouds linear infinite;
        }
        @keyframes moveClouds { from { left: -200px; } to { left: 110%; } }

        .leaf {
            position: fixed; color: #388e3c; z-index: -1;
            animation: fall linear infinite; pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .music-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: var(--hd-gold); border: 4px solid var(--hd-border);
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 5px 0 var(--hd-border); display: flex;
            justify-content: center; align-items: center; font-size: 1.2rem;
        }

        /* --- CONTAINER UTAMA --- */
        .farm-container {
            width: 100%; max-width: 460px;
            background: #8d6e63 url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            border: 10px solid var(--hd-border); border-radius: 40px;
            box-shadow: 0 25px 0 rgba(0,0,0,0.2), 0 50px 100px rgba(0,0,0,0.4);
            padding: 60px 15px 30px; position: relative;
            margin-top: 60px; text-align: center;
            transform: scale(0); animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn { to { transform: scale(1); } }

        .profile-wrap {
            position: absolute; top: -75px; left: 50%; transform: translateX(-50%);
            width: 130px; height: 130px; z-index: 10;
        }
        .profile-img {
            width: 100%; height: 100%; border-radius: 30px;
            border: 6px solid var(--hd-gold); background: white;
            box-shadow: 0 10px 0 var(--hd-border); overflow: hidden;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive; color: var(--hd-gold);
            font-size: 2.3rem; text-shadow: 4px 4px 0px var(--hd-border);
            margin: 20px 0 15px;
        }

        /* --- GRID HARGA 2 KOLOM (9:16) --- */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; margin-bottom: 30px;
        }
        .gallery-item {
            background: var(--hd-border); border-radius: 18px; position: relative;
            padding-top: 177.77%; overflow: hidden; border: 4px solid var(--hd-border);
            transition: 0.3s; box-shadow: 0 8px 0 rgba(0,0,0,0.2); cursor: pointer;
        }
        .gallery-item img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
        }

        /* --- TOMBOL LINK SOSMED --- */
        .link-tree { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            position: relative; display: flex; align-items: center; justify-content: center;
            padding: 18px; border-radius: 20px; text-decoration: none; color: white;
            font-family: 'Luckiest Guy', cursive; font-size: 1.3rem;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.4); border: 3px solid var(--hd-border); transition: 0.1s;
        }

        .ch-wa { background: var(--wa-ch-deep); box-shadow: 0 8px 0 #043d37; }
        .wa { background: var(--wa-green); box-shadow: 0 8px 0 #27ae60; }
        .ig { background: var(--ig-gradient); box-shadow: 0 8px 0 #ad1457; }
        .tk { background: #000; box-shadow: 0 8px 0 #333; }
        .fb { background: var(--fb-blue); box-shadow: 0 8px 0 #0d47a1; }

        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .btn i { margin-right: 12px; }

        /* Lightbox Zoom */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 85vh; border: 8px solid var(--hd-gold); border-radius: 20px; }

    </style>
</head>
<body>

    <div class="music-btn" onclick="toggleMusic()">
        <i id="m-icon" class="fas fa-play"></i>
    </div>
    <audio id="bgm" loop>
        <source src="Hay Day - Music .mp3" type="audio/mpeg">
    </audio>

    <div class="cloud" style="top: 10%; width: 120px; height: 45px; animation-duration: 25s;"></div>
    <div class="cloud" style="top: 30%; width: 180px; height: 60px; animation-duration: 40s; opacity: 0.5;"></div>

    <div class="farm-container">
        <div class="profile-wrap">
            <div class="profile-img">
                <img src="IMG-20260502-WA0022.jpg" width="100%">
            </div>
            </div>

        <h1>RAJENDRA HD SHOP</h1>

        <div class="gallery-grid">
            <div class="gallery-item" onclick="zoom(this)"><img src="IMG-20260502-WA0030.jpg"></div>
            <div class="gallery-item" onclick="zoom(this)"><img src="IMG-20260502-WA0031.jpg"></div>
            <div class="gallery-item" onclick="zoom(this)"><img src="IMG-20260502-WA0035.jpg"></div>
            <div class="gallery-item" onclick="zoom(this)"><img src="IMG-20260502-WA0033(1).jpg"></div>
            <div class="gallery-item" onclick="zoom(this)"><img src="IMG-20260502-WA0032.jpg"></div>
            <div class="gallery-item" onclick="zoom(this)"><img src="IMG-20260416-WA0302(1).jpg"></div>
        </div>

        <div class="link-tree">
            <a href="https://whatsapp.com/channel/0029VbBiUXr6WaKnm0RW5641" class="btn ch-wa"><i class="fas fa-bullhorn"></i> SALURAN WA</a>
            <a href="https://wa.me/6285745433213" class="btn wa"><i class="fab fa-whatsapp"></i> ADMIN WA</a>
            <a href="https://www.instagram.com/rajendra_hd_shop?igsh=YTFrZmdnZzRsYW5i" class="btn ig"><i class="fab fa-instagram"></i> INSTAGRAM</a>
            <a href="https://www.tiktok.com/@rajendrahdshop?_r=1&_t=ZS-95AaqJfwLM9" class="btn tk"><i class="fab fa-tiktok"></i> TIKTOK</a>
            <a href="https://www.facebook.com/share/1BSt1f3bJv/" class="btn fb"><i class="fab fa-facebook"></i> FACEBOOK</a>
        </div>
    </div>

    <div class="lightbox" id="lbox" onclick="this.classList.remove('active')">
        <img id="limg" src="">
    </div>

    <script>
        // Animasi Daun
        for (let i = 0; i < 15; i++) {
            let leaf = document.createElement('i');
            leaf.className = 'fas fa-leaf leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 5 + 7) + 's';
            leaf.style.top = "-50px";
            leaf.style.opacity = Math.random();
            document.body.appendChild(leaf);
        }

        // Fungsi Zoom
        function zoom(el) {
            document.getElementById('limg').src = el.querySelector('img').src;
            document.getElementById('lbox').classList.add('active');
        }

        // Kontrol Musik
        const m = document.getElementById('bgm');
        const mi = document.getElementById('m-icon');
        function toggleMusic() {
            if (m.paused) { m.play(); mi.className = 'fas fa-pause'; }
            else { m.pause(); mi.className = 'fas fa-play'; }
        }
    </script>
</body>
</html>
